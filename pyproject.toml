[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "xingce-solver"
version = "0.1.0"
description = "Phase-1 CLI and retrieval utilities for the Xingce knowledge base."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["mcp>=1.0.0"]

[project.scripts]
xingce-solver = "xingce_solver.cli:main"
xingce-solver-mcp = "xingce_solver.mcp_server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
