      - "正方体"
      - "六面体"
      - "相对面"
      - "公共边"
    visual_triggers:
      - "立方体展开图与立体选项"
    question_type: "空间重构"
    priority_method_id: "gr_cube_net_overall_001"
    backup_method_id:
      - "gr_cube_opposite_faces_001"
      - "gr_cube_common_edge_001"
      - "gr_cube_clockwise_method_001"
  -
    name: "相对面"
    keywords:
      - "相对面"
      - "不能同时出现"
