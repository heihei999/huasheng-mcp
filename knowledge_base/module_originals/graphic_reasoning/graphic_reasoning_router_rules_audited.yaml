    priority_method_id: "gr_functional_element_001"
    backup_method_id:
      - "gr_position_translate_001"
  -
    name: "黑白块专项"
    keywords:
      - "黑白块"
      - "黑格"
      - "白格"
      - "黑色面积"
      - "连通块"
