  option_features:
  - 另有他因
  - 因果倒置
  - 否定此因
  - 根表原因
  priority_method_id: lj_attribution_general_001
  backup_method_id:
  - lj_weaken_alternative_cause_001
  - lj_weaken_reverse_causation_001
  - lj_weaken_not_this_cause_001
  - lj_weaken_root_surface_cause_001
- route_name: 对比实验
  question_type: 加强削弱
  stem_keywords:
