version: final_merged_v1
routing_policy:
  first_step: 先识别大模块，再识别题型，最后调用 priority_method_id 对应卡片；禁止跳过方法卡片直接作答。
  need_review_policy: 引用 need_review=true 或 route.need_review=true 的规则时，必须提示人工复核，不作为高优先级自动调用。
  source: 合并七个 source-audited 模块 zip 的 router_rules。
